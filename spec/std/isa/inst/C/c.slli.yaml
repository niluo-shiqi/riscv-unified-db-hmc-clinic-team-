# yaml-language-server: $schema=../../../../schemas/inst_schema.json

$schema: "inst_schema.json#"
kind: instruction
name: c.slli
long_name: Shift left logical immediate
description: |
  Shift the value in xd left by shamt, and store the result back in xd.
  C.SLLI expands into `slli xd, xd, shamt`.
definedBy:
  extension:
    name: Zca
assembly: xd, shamt
encoding:
  RV32:
    match: 0000----------10
    variables:
      - name: shamt
        location: 6-2
        not: 0
      - name: xd
        location: 11-7
  RV64:
    match: 000-----------10
    variables:
      - name: shamt
        location: 12|6-2
        not: 0
      - name: xd
        location: 11-7
access:
  s: always
  u: always
  vs: always
  vu: always
operation(): |
  # shamt is between 0-63
  X[xd] = X[xd] << shamt;
