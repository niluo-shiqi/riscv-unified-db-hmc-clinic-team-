# yaml-language-server: $schema=../../../../schemas/inst_schema.json

$schema: "inst_schema.json#"
kind: instruction
name: sh2add
long_name: Shift left by 2 and add
description: |
  Shifts `xs1` to the left by 2 places and adds it to `xs2`.
definedBy:
  extension:
    name: Zba
assembly: xd, xs1, xs2
encoding:
  match: 0010000----------100-----0110011
  variables:
    - name: xs2
      location: 24-20
    - name: xs1
      location: 19-15
    - name: xd
      location: 11-7
access:
  s: always
  u: always
  vs: always
  vu: always
operation(): |
  if (implemented?(ExtensionName::B) && (CSR[misa].B == 1'b0)) {
    raise (ExceptionCode::IllegalInstruction, mode(), $encoding);
  }

  X[xd] = X[xs2] + (X[xs1] << 2);
