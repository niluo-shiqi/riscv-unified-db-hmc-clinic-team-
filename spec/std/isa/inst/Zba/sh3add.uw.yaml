# yaml-language-server: $schema=../../../../schemas/inst_schema.json

$schema: "inst_schema.json#"
kind: instruction
name: sh3add.uw
long_name: Shift unsigned word left by 3 and add
description: |
  Performs an XLEN-wide addition of two addends. The first addend is xs2.
  The second addend is the unsigned value formed by extracting the least-significant word of xs1
  and shifting it left by 3 places.
definedBy:
  allOf:
    - xlen: 64
    - extension:
        name: Zba
assembly: xd, xs1, xs2
encoding:
  match: 0010000----------110-----0111011
  variables:
    - name: xs2
      location: 24-20
    - name: xs1
      location: 19-15
    - name: xd
      location: 11-7
access:
  s: always
  u: always
  vs: always
  vu: always
operation(): |
  if (implemented?(ExtensionName::B) && (CSR[misa].B == 1'b0)) {
    raise (ExceptionCode::IllegalInstruction, mode(), $encoding);
  }

  X[xd] = X[xs2] + (X[xs1][31:0] << 3);
