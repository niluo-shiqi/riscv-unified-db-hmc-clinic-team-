# yaml-language-server: $schema=../../../../schemas/inst_schema.json

$schema: "inst_schema.json#"
kind: instruction
name: slti
long_name: Set on less than immediate
description: |
  Places the value 1 in register `xd` if register `xs1` is less than the sign-extended immediate
  when both are treated as signed numbers, else 0 is written to `xd`.
definedBy:
  extension:
    name: I
assembly: xd, xs1, imm
encoding:
  match: "-----------------010-----0010011"
  variables:
    - name: imm
      location: 31-20
    - name: xs1
      location: 19-15
    - name: xd
      location: 11-7
access:
  s: always
  u: always
  vs: always
  vu: always
data_independent_timing: true
operation(): |
  X[xd] = ($signed(X[xs1]) < $signed(imm)) ? '1 : '0;
