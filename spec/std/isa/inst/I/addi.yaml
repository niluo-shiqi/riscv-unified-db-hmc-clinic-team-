# yaml-language-server: $schema=../../../../schemas/inst_schema.json

$schema: "inst_schema.json#"
kind: instruction
name: addi
long_name: Add immediate
description:
  Adds an immediate value to the value in xs1, and store the result in
  xd
definedBy:
  extension:
    name: I
assembly: xd, xs1, imm
encoding:
  match: "-----------------000-----0010011"
  variables:
    - name: imm
      location: 31-20
    - name: xs1
      location: 19-15
    - name: xd
      location: 11-7
access:
  s: always
  u: always
  vs: always
  vu: always
data_independent_timing: true
pseudoinstructions:
  - when: (xd == 0 && xs1 == 0 && imm == 0)
    to: nop
  - when: imm == 0
    to: mv xd, xs1
operation(): X[xd] = X[xs1] + $signed(imm);
