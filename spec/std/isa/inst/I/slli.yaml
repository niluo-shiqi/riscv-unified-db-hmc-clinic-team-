# yaml-language-server: $schema=../../../../schemas/inst_schema.json

$schema: "inst_schema.json#"
kind: instruction
name: slli
long_name: Shift left logical immediate
description: Shift the value in xs1 left by shamt, and store the result in xd
definedBy:
  extension:
    name: I
assembly: xd, xs1, shamt
encoding:
  RV32:
    match: 0000000----------001-----0010011
    variables:
      - name: shamt
        location: 24-20
      - name: xs1
        location: 19-15
      - name: xd
        location: 11-7
  RV64:
    match: 000000-----------001-----0010011
    variables:
      - name: shamt
        location: 25-20
      - name: xs1
        location: 19-15
      - name: xd
        location: 11-7
access:
  s: always
  u: always
  vs: always
  vu: always
data_independent_timing: true
operation(): |
  # shamt is between 0-(XLEN-1)
  X[xd] = X[xs1] << shamt;
