# yaml-language-server: $schema=../../../../schemas/inst_schema.json

$schema: "inst_schema.json#"
kind: instruction
name: ori
long_name: Or immediate
description: Or an immediate to the value in xs1, and store the result in xd
definedBy:
  extension:
    name: I
assembly: xd, xs1, imm
encoding:
  match: "-----------------110-----0010011"
  variables:
    - name: imm
      location: 31-20
    - name: xs1
      location: 19-15
    - name: xd
      location: 11-7
access:
  s: always
  u: always
  vs: always
  vu: always
data_independent_timing: true
hints:
  - { $ref: inst/Zicbop/prefetch.r.yaml# }
  - { $ref: inst/Zicbop/prefetch.w.yaml# }
  - { $ref: inst/Zicbop/prefetch.i.yaml# }
operation(): |
  X[xd] = X[xs1] | $signed(imm);
