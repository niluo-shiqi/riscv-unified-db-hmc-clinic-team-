# yaml-language-server: $schema=../../../../schemas/inst_schema.json

$schema: "inst_schema.json#"
kind: instruction
name: sll
long_name: Shift left logical
description: |
  Shift the value in `xs1` left by the value in the lower 6 bits of `xs2`, and store the result in `xd`.
definedBy:
  extension:
    name: I
assembly: xd, xs1, xs2
encoding:
  match: 0000000----------001-----0110011
  variables:
    - name: xs2
      location: 24-20
    - name: xs1
      location: 19-15
    - name: xd
      location: 11-7
access:
  s: always
  u: always
  vs: always
  vu: always
data_independent_timing: true
operation(): |
  if (xlen() == 64) {
    X[xd] = X[xs1] << X[xs2][5:0];
  } else {
    X[xd] = X[xs1] << X[xs2][4:0];
  }
