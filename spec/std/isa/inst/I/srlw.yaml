# yaml-language-server: $schema=../../../../schemas/inst_schema.json

$schema: "inst_schema.json#"
kind: instruction
name: srlw
long_name: Shift right logical word
description: |
  Logical shift the 32-bit value in `xs1` right by the value in the lower 5 bits of `xs2`, and store the sign-extended result in `xd`.
definedBy:
  allOf:
    - xlen: 64
    - extension:
        name: I
assembly: xd, xs1, xs2
encoding:
  match: 0000000----------101-----0111011
  variables:
    - name: xs2
      location: 24-20
    - name: xs1
      location: 19-15
    - name: xd
      location: 11-7
access:
  s: always
  u: always
  vs: always
  vu: always
data_independent_timing: true
operation(): X[xd] = sext(X[xs1][31:0] >> X[xs2][4:0], 32);
