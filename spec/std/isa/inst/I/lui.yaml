# yaml-language-server: $schema=../../../../schemas/inst_schema.json

$schema: "inst_schema.json#"
kind: instruction
name: lui
long_name: Load upper immediate
description: Load the zero-extended imm into xd.
definedBy:
  extension:
    name: I
assembly: xd, imm
encoding:
  match: "-------------------------0110111"
  variables:
    - name: imm
      location: 31-12
      left_shift: 12
    - name: xd
      location: 11-7
access:
  s: always
  u: always
  vs: always
  vu: always
data_independent_timing: true
operation(): X[xd] = $signed(imm);
