# yaml-language-server: $schema=../../../../schemas/inst_schema.json

$schema: "inst_schema.json#"
kind: instruction
name: jalr
long_name: Jump and link register
description: |
  Jump to an address formed by adding xs1
  to a signed offset then clearing the least
  significant bit, and store the return address
  in xd.
definedBy:
  extension:
    name: I
assembly: xd, imm(xs1)
encoding:
  match: "-----------------000-----1100111"
  variables:
    - name: imm
      location: 31-20
      sign_extend: true
    - name: xs1
      location: 19-15
    - name: xd
      location: 11-7
access:
  s: always
  u: always
  vs: always
  vu: always
pseudoinstructions:
  - when: xd == 0
    to: jr imm(xs1)
  - when: (xd == 0 && xs1 == x1 && imm == 0)
    to: ret
operation(): |
  XReg addr = (X[xs1] + $signed(imm)) & ~MXLEN'1;
  XReg returnaddr;
  returnaddr = $pc + 4;

  X[xd] = returnaddr;
  jump(addr);
