# yaml-language-server: $schema=../../../../schemas/inst_schema.json

$schema: "inst_schema.json#"
kind: instruction
name: maxu
long_name: Unsigned maximum
description: |
  Returns the larger of two unsigned integers.
definedBy:
  extension:
    name: Zbb
assembly: xd, xs1, xs2
encoding:
  match: 0000101----------111-----0110011
  variables:
    - name: xs2
      location: 24-20
    - name: xs1
      location: 19-15
    - name: xd
      location: 11-7
access:
  s: always
  u: always
  vs: always
  vu: always
operation(): |
  if (implemented?(ExtensionName::B) && (CSR[misa].B == 1'b0)) {
    raise (ExceptionCode::IllegalInstruction, mode(), $encoding);
  }

  X[xd] = (X[xs1] > X[xs2]) ? X[xs1] : X[xs2];
