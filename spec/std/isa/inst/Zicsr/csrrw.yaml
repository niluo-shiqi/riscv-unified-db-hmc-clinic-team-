# yaml-language-server: $schema=../../../../schemas/inst_schema.json

$schema: "inst_schema.json#"
kind: instruction
name: csrrw
long_name: Atomic Read/Write CSR
description: |
  Atomically swap values in the CSRs and integer registers.

  Read the old value of the CSR, zero-extends the value to `XLEN` bits,
  and then write it to integer register xd.
  The initial value in xs1 is written to the CSR.
  If `xd=x0`, then the instruction shall not read the CSR and shall not
  cause any of the side effects that might occur on a CSR read.
definedBy:
  extension:
    name: Zicsr
assembly: xd, csr, xs1
encoding:
  match: "-----------------001-----1110011"
  variables:
    - name: csr
      location: 31-20
    - name: xs1
      location: 19-15
    - name: xd
      location: 11-7
access:
  s: always
  u: always
  vs: always
  vu: always
pseudoinstructions:
  - when: xd == 0
    to: csrw csr, xs1
operation(): |
  Csr csr_handle = direct_csr_lookup(csr);

  Bits<MXLEN> initial_value = X[xs1];

  # permission checks
  if (csr_handle.valid == false) {
    unimplemented_csr($encoding);
  } else if (!compatible_mode?(csr_handle.mode, mode())) {
    raise (ExceptionCode::IllegalInstruction, mode(), $encoding);
  } else if (csr_handle.writable == false) {
    raise (ExceptionCode::IllegalInstruction, mode(), $encoding);
  }

  if (xd != 0) {
    X[xd] = csr_sw_read(csr_handle);
  }

  # writes the value in X[xs1] to the CSR,
  # performing any WARL transformations first
  csr_sw_write(csr_handle, initial_value);
