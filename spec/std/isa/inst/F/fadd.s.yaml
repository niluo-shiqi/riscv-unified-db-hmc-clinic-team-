# yaml-language-server: $schema=../../../../schemas/inst_schema.json

$schema: "inst_schema.json#"
kind: instruction
name: fadd.s
long_name: Floating-Point Add Single-Precision
description: |
  The `fadd.s` instruction performs single-precision floating-point addition of `fs1` and `fs2`
  and writes the final result to `fd`.
definedBy:
  extension:
    name: F
assembly: fd, fs1, fs2, rm
encoding:
  match: 0000000------------------1010011
  variables:
    - name: fs2
      location: 24-20
    - name: fs1
      location: 19-15
    - name: rm
      location: 14-12
    - name: fd
      location: 11-7
access:
  s: always
  u: always
  vs: always
  vu: always
data_independent_timing: true
operation(): |
  check_f_ok($encoding);
  RoundingMode mode = rm_to_mode(rm, $encoding);
  Bits<32> a = f[fs1];
  Bits<32> b = f[fs2];

  if (implemented?(ExtensionName::D)) {
    # check for incorrectly NaN-boxed inputs
    if (f[fs1][63:32] != 32'hffffffff) {
      a = SP_CANONICAL_NAN;
    }
    if (f[fs2][63:32] != 32'hffffffff) {
      b = SP_CANONICAL_NAN;
    }
  }

  f[fd] = f32_add(a, b, mode);

  mark_f_state_dirty();
