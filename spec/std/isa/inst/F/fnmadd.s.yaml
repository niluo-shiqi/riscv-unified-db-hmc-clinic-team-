# yaml-language-server: $schema=../../../../schemas/inst_schema.json

$schema: "inst_schema.json#"
kind: instruction
name: fnmadd.s
long_name: Floating-Point Negate-Multiply-Add Single-Precision
description: |
  The `fnmadd.s` multiplies the values in `fs1` and `fs2`, negates the product, subtracts the value in `fs3`, and
  writes the final result to `fd`.
definedBy:
  extension:
    name: F
assembly: fd, fs1, fs2, fs3, rm
encoding:
  match: "-----00------------------1001111"
  variables:
    - name: fs3
      location: 31-27
    - name: fs2
      location: 24-20
    - name: fs1
      location: 19-15
    - name: rm
      location: 14-12
    - name: fd
      location: 11-7
access:
  s: always
  u: always
  vs: always
  vu: always
data_independent_timing: true
operation(): |
  check_f_ok($encoding);
  RoundingMode mode = rm_to_mode(rm, $encoding);
  # fnmadd: -(fs1 * fs2) - fs3 = -(fs1 * fs2) + (-fs3)
  # Negate fs3 by flipping its sign bit, then use subProd op
  Bits<32> fs3_negated = f[fs3][31:0] ^ 32'h80000000;
  f[fd] = f32_muladd(f[fs1], f[fs2], fs3_negated, F32MulAddOp::Softfloat_mulAdd_subProd, mode);
  mark_f_state_dirty();
