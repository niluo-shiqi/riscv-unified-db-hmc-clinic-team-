# yaml-language-server: $schema=../../../../schemas/inst_schema.json

$schema: "inst_schema.json#"
kind: instruction
name: fnmsub.s
long_name: Floating-Point Negate-Multiply-Subtract Single-Precision
description: |
  The `fnmsub.s` instruction multiplies the values in `fs1` and `fs2`, negates the product, adds the value in `fs3`, and
  writes the final result to `fd`.
definedBy:
  extension:
    name: F
assembly: fd, fs1, fs2, fs3, rm
encoding:
  match: "-----00------------------1001011"
  variables:
    - name: fs3
      location: 31-27
    - name: fs2
      location: 24-20
    - name: fs1
      location: 19-15
    - name: rm
      location: 14-12
    - name: fd
      location: 11-7
access:
  s: always
  u: always
  vs: always
  vu: always
data_independent_timing: true
operation(): |
  check_f_ok($encoding);
  RoundingMode mode = rm_to_mode(rm, $encoding);
  f[fd] = f32_muladd(f[fs1], f[fs2], f[fs3], F32MulAddOp::Softfloat_mulAdd_subProd, mode);
  mark_f_state_dirty();
