# yaml-language-server: $schema=../../../../schemas/inst_schema.json

$schema: "inst_schema.json#"
kind: instruction
name: fcvt.l.s
long_name: Floating-Point Convert Single-Precision to Long
description: |
  The `fcvt.l.s` instruction converts a floating-point number in floating-point register `fs1` to a signed
  64-bit integer, in integer register `xd`.
definedBy:
  allOf:
    - xlen: 64
    - extension:
        name: F
assembly: xd, fs1, rm
encoding:
  match: 110000000010-------------1010011
  variables:
    - name: fs1
      location: 19-15
    - name: rm
      location: 14-12
    - name: xd
      location: 11-7
access:
  s: always
  u: always
  vs: always
  vu: always
data_independent_timing: true
operation(): |
  check_f_ok($encoding);
  RoundingMode rounding_mode = rm_to_mode(rm, $encoding);
  X[xd] = f32_to_i64(f[fs1], rounding_mode);
