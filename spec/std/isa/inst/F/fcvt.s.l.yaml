# yaml-language-server: $schema=../../../../schemas/inst_schema.json

$schema: "inst_schema.json#"
kind: instruction
name: fcvt.s.l
long_name: Floating-Point Convert Long to Single-Precision
description: |
  The `fcvt.s.l` instruction converts a 64-bit signed integer in integer register `xs1` into a floating-point
  number in floating-point register `fd`.
definedBy:
  allOf:
    - xlen: 64
    - extension:
        name: F
assembly: fd, xs1, rm
encoding:
  match: 110100000010-------------1010011
  variables:
    - name: xs1
      location: 19-15
    - name: rm
      location: 14-12
    - name: fd
      location: 11-7
access:
  s: always
  u: always
  vs: always
  vu: always
data_independent_timing: true
operation(): |
  check_f_ok($encoding);
  RoundingMode rounding_mode = rm_to_mode(rm, $encoding);
  f[fd] = i64_to_f32(X[xs1], rounding_mode);
  mark_f_state_dirty();
