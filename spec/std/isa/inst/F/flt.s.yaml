# yaml-language-server: $schema=../../../../schemas/inst_schema.json

$schema: "inst_schema.json#"
kind: instruction
name: flt.s
long_name: Floating-Point Less Than Single-Precision
description: |
  The `flt.s` instruction writes 1 to `xd` if `fs1` is less than `fs2`, and 0 otherwise.
  If either operand is NaN, the result is 0 (not equal). If either operand is a NaN
  (signaling or quiet), the invalid flag is set.

definedBy:
  extension:
    name: F
assembly: xd, fs1, fs2
encoding:
  match: 1010000----------001-----1010011
  variables:
    - name: fs2
      location: 24-20
    - name: fs1
      location: 19-15
    - name: xd
      location: 11-7
access:
  s: always
  u: always
  vs: always
  vu: always
data_independent_timing: true
operation(): |
  check_f_ok($encoding);

  Bits<32> sp_value_a = f[fs1][31:0];
  Bits<32> sp_value_b = f[fs2][31:0];
  Bits<1> sign_a = sp_value_a[31];
  Bits<1> sign_b = sp_value_b[31];

  if (is_sp_nan?(sp_value_a) || is_sp_nan?(sp_value_b)) {
    set_fp_flag(FpFlag::NV);
    X[xd] = 0;
  } else {
    if (sign_a != sign_b) {
      X[xd] = (
        (sign_a == 1) # a is neg and b is pos
        && ((sp_value_a[30:0] | sp_value_b[30:0]) != 0) # a and b are not both zero
       ) ? 1 : 0;
    } else {
      X[xd] = (
        (sp_value_a != sp_value_b) # a and b are not equal
        && ((sign_a ^ ((sp_value_a < sp_value_b) ? 1 : 0)) != 0)# a < b
      ) ? 1 : 0;
    }
  }
