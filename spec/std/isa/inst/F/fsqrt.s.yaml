# yaml-language-server: $schema=../../../../schemas/inst_schema.json

$schema: "inst_schema.json#"
kind: instruction
name: fsqrt.s
long_name: Floating-Point Square Root Single-Precision
description: |
  The `fsqrt.s` instruction computes the square root of `fs1` and writes the result is written to `fd`.
definedBy:
  extension:
    name: F
assembly: fd, fs1, rm
encoding:
  match: 010110000000-------------1010011
  variables:
    - name: fs1
      location: 19-15
    - name: rm
      location: 14-12
    - name: fd
      location: 11-7
access:
  s: always
  u: always
  vs: always
  vu: always
data_independent_timing: true
operation(): |
  check_f_ok($encoding);
  RoundingMode mode = rm_to_mode(rm, $encoding);
  f[fd] = f32_sqrt(f[fs1], mode);
  mark_f_state_dirty();
