# yaml-language-server: $schema=../../../../schemas/inst_schema.json

$schema: "inst_schema.json#"
kind: instruction
name: bset
long_name: Single-Bit set (Register)
description: |
  Returns xs1 with a single bit set at the index specified in xs2.
  The index is read from the lower log2(XLEN) bits of xs2.
definedBy:
  extension:
    name: Zbs
assembly: xd, xs1, xs2
encoding:
  match: 0010100----------001-----0110011
  variables:
    - name: xs2
      location: 24-20
    - name: xs1
      location: 19-15
    - name: xd
      location: 11-7
access:
  s: always
  u: always
  vs: always
  vu: always
operation(): |
  if (implemented?(ExtensionName::B) && (CSR[misa].B == 1'b0)) {
    raise (ExceptionCode::IllegalInstruction, mode(), $encoding);
  }

  XReg index = X[xs2] & (xlen() - 1);
  X[xd] = X[xs1] | (1 << index);
