# yaml-language-server: $schema=../../../../schemas/inst_schema.json

$schema: "inst_schema.json#"
kind: instruction
name: remu
long_name: Unsigned remainder
description: |
  Calculate the remainder of unsigned division of xs1 by xs2, and store the result in xd.
definedBy:
  extension:
    name: M
assembly: xd, xs1, xs2
encoding:
  match: 0000001----------111-----0110011
  variables:
    - name: xs2
      location: 24-20
    - name: xs1
      location: 19-15
    - name: xd
      location: 11-7
access:
  s: always
  u: always
  vs: always
  vu: always
operation(): |
  if (implemented?(ExtensionName::M) && (CSR[misa].M == 1'b0)) {
    raise (ExceptionCode::IllegalInstruction, mode(), $encoding);
  }

  XReg src1 = X[xs1];
  XReg src2 = X[xs2];

  if (src2 == 0) {
    # division by zero. Since RISC-V does not have arithmetic exceptions, the result is defined
    # to be the dividend
    X[xd] = src1;
  } else {
    X[xd] = src1 % src2;
  }
