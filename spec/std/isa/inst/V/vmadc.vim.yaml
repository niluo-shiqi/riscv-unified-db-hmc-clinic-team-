# yaml-language-server: $schema=../../../../schemas/inst_schema.json

$schema: "inst_schema.json#"
kind: instruction
name: vmadc.vim
long_name: "Vector multiply-add with carry and masked"
description: |
  Performs multiply-add operation on elements from vector register vs2 and immediate value, adds the carry-in from vector register vs3, and stores results in vector register vd, using vector mask vm. This variant includes additional masking behavior.
definedBy:
  extension:
    name: Zvl32b
assembly: vd, vs2, imm, v0
encoding:
  match: 0100010----------011-----1010111
  variables:
    - name: vs2
      location: 24-20
    - name: imm
      location: 19-15
    - name: vd
      location: 11-7
access:
  s: always
  u: always
  vs: always
  vu: always
data_independent_timing: false
operation(): |
