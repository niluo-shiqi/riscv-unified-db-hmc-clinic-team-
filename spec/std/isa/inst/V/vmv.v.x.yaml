# yaml-language-server: $schema=../../../../schemas/inst_schema.json

$schema: "inst_schema.json#"
kind: instruction
name: vmv.v.x
long_name: "Vector scalar to vector move"
description: |
  Broadcasts scalar register xs1 to all elements of vector register vd, using vector mask vm. This operation creates a vector with identical elements.
definedBy:
  extension:
    name: Zvl32b
assembly: vd, xs1
encoding:
  match: 010111100000-----100-----1010111
  variables:
    - name: xs1
      location: 19-15
    - name: vd
      location: 11-7
access:
  s: always
  u: always
  vs: always
  vu: always
data_independent_timing: false
operation(): |
