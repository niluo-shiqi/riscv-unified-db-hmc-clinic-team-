# yaml-language-server: $schema=../../../../schemas/inst_schema.json

$schema: "inst_schema.json#"
kind: instruction
name: vmerge.vvm
long_name: Vector merge with mask
description: |
  Merges elements from vs1 and vs2 using mask register v0 and stores results in vd. Where mask bits are set, elements from vs1 are selected; otherwise elements from vs2 are selected.
definedBy:
  extension:
    name: Zvl32b
assembly: vd, vs2, vs1, v0
encoding:
  match: 0101110----------000-----1010111
  variables:
    - name: vs2
      location: 24-20
    - name: vs1
      location: 19-15
    - name: vd
      location: 11-7
access:
  s: always
  u: always
  vs: always
  vu: always
data_independent_timing: false
operation(): |
