# yaml-language-server: $schema=../../../../schemas/inst_schema.json

$schema: "inst_schema.json#"
kind: instruction
name: vadd.vv
long_name: Vector-vector integer addition
description: |
  Add source vector register groups from vs1 and vs2 according to mask vm and store results in vd.
definedBy:
  extension:
    name: Zvl32b
assembly: vd, vs2, vs1, vm
encoding:
  match: 000000-----------000-----1010111
  variables:
    - name: vm
      location: 25-25
    - name: vs2
      location: 24-20
    - name: vs1
      location: 19-15
    - name: vd
      location: 11-7
access:
  s: always
  u: always
  vs: always
  vu: always
data_independent_timing: true
operation(): |
  VectorState state = vector_state();
  VectorLmulType lmul_type = state.lmul_type;

  XReg vlen = VLEN;
  XReg vlmax;
  if (lmul_type == VectorLmulType::Multiply) {
    vlmax = (vlen << state.log2_lmul) >> state.log2_sew;
  } else {
    # (lmul_type == VectorLmulType::Divide)
    vlmax = (vlen >> state.log2_lmul) >> state.log2_sew;
  }

  for (U32 i = CSR[vstart].VALUE; i < CSR[vl].VALUE; i++) {
    U32 start_bit_pos = i * state.sew;
    U32 end_bit_pos = start_bit_pos + state.sew - 1;
    v[vd] = {
      v[vd][VLEN-1:end_bit_pos + 1],
      (v[vs2])[end_bit_pos:start_bit_pos] + (v[vs1])[end_bit_pos:start_bit_pos],
      v[vd][start_bit_pos-1:0]
      };
  }

  CSR[vstart].VALUE = 0;
