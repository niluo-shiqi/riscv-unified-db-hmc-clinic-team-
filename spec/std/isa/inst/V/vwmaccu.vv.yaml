# yaml-language-server: $schema=../../../../schemas/inst_schema.json

$schema: "inst_schema.json#"
kind: instruction
name: vwmaccu.vv
long_name: "Vector widening unsigned multiply-add"
description: |
  Performs widening unsigned multiplication on elements from vector registers vs2 and vs1, adds the result to elements from vector register vd, and stores the final results in vector register vd, using vector mask vm.
definedBy:
  extension:
    name: Zvl32b
assembly: vd, vs1, vs2, vm
encoding:
  match: 111100-----------010-----1010111
  variables:
    - name: vm
      location: 25-25
    - name: vs2
      location: 24-20
    - name: vs1
      location: 19-15
    - name: vd
      location: 11-7
access:
  s: always
  u: always
  vs: always
  vu: always
data_independent_timing: false
operation(): |
