# yaml-language-server: $schema=../../../../schemas/inst_schema.json

$schema: "inst_schema.json#"
kind: instruction
name: vssrl.vi
long_name: Vector shift right logical by immediate
description: |
  Performs a logical right shift on each element in vector register vs2 by the immediate shift amount, storing results in vector register vd according to mask vm. This is not a memory operation but a shift operation.
definedBy:
  extension:
    name: Zvl32b
assembly: vd, vs2, imm, vm
encoding:
  match: 101010-----------011-----1010111
  variables:
    - name: vm
      location: 25-25
    - name: vs2
      location: 24-20
    - name: imm
      location: 19-15
    - name: vd
      location: 11-7
access:
  s: always
  u: always
  vs: always
  vu: always
data_independent_timing: false
operation(): |
