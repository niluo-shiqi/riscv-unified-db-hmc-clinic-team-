# yaml-language-server: $schema=../../../../schemas/inst_schema.json

$schema: "inst_schema.json#"
kind: instruction
name: vse8.v
long_name: Vector 8-bit unit-stride store
description: |
  Stores 8-bit elements from vector register vs3 to memory starting at address in xs1 register, using vector mask vm. The effective element width is 8 bits regardless of SEW setting.
definedBy:
  extension:
    name: Zvl32b
assembly: vs3, (xs1), vm
encoding:
  match: 000000-00000-----000-----0100111
  variables:
    - name: vm
      location: 25-25
    - name: xs1
      location: 19-15
    - name: vs3
      location: 11-7
access:
  s: always
  u: always
  vs: always
  vu: always
data_independent_timing: false
operation(): |
  XReg virtual_address = X[xs1];
  # "A simple in-order implementation can ignore the settings and simply execute all vector instructions using the undisturbed policy"
  for (U32 i = 0; i < CSR[vl].VALUE; i++) {
    U32 start_bit_pos = (CSR[vstart].VALUE + i) * 8;
    U32 end_bit_pos = start_bit_pos + 7;
    write_memory(8, virtual_address, v[vs3][end_bit_pos:start_bit_pos], $encoding);
    virtual_address = virtual_address + 1;
  }
