# yaml-language-server: $schema=../../../../schemas/inst_schema.json

$schema: "inst_schema.json#"
kind: instruction
name: vfmv.s.f
long_name: "Vector scalar to floating-point move"
description: |
  Moves scalar floating-point value from register fs1 to all elements of vector register vd, using vector mask vm. This operation broadcasts a scalar to a vector.
definedBy:
  extension:
    name: Zvl32b
assembly: vd, fs1
encoding:
  match: 010000100000-----101-----1010111
  variables:
    - name: fs1
      location: 19-15
    - name: vd
      location: 11-7
access:
  s: always
  u: always
  vs: always
  vu: always
data_independent_timing: false
operation(): |
