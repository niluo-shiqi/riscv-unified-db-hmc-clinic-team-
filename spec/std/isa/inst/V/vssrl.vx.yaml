# yaml-language-server: $schema=../../../../schemas/inst_schema.json

$schema: "inst_schema.json#"
kind: instruction
name: vssrl.vx
long_name: Vector shift right logical by vector
description: |
  Performs a logical right shift on each element in vector register vs2 by the shift amount in vector register vs1, storing results in vector register vd according to mask vm. This is not a memory operation but a shift operation.
definedBy:
  extension:
    name: Zvl32b
assembly: vd, vs2, xs1, vm
encoding:
  match: 101010-----------100-----1010111
  variables:
    - name: vm
      location: 25-25
    - name: vs2
      location: 24-20
    - name: xs1
      location: 19-15
    - name: vd
      location: 11-7
access:
  s: always
  u: always
  vs: always
  vu: always
data_independent_timing: false
operation(): |
