# yaml-language-server: $schema=../../../../schemas/inst_schema.json

$schema: "inst_schema.json#"
kind: instruction
name: vsbc.vxm
long_name: "Vector subtract with borrow and scalar, masked"
description: |
  Performs subtraction on elements from vector register vs2 and scalar register xs1, subtracts the borrow-in from vector register vs3, and stores results in vector register vd, using vector mask vm.
definedBy:
  extension:
    name: Zvl32b
assembly: vd, vs2, xs1, v0
encoding:
  match: 0100100----------100-----1010111
  variables:
    - name: vs2
      location: 24-20
    - name: xs1
      location: 19-15
    - name: vd
      location: 11-7
access:
  s: always
  u: always
  vs: always
  vu: always
data_independent_timing: false
operation(): |
