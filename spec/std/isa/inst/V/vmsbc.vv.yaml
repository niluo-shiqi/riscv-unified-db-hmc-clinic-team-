# yaml-language-server: $schema=../../../../schemas/inst_schema.json

$schema: "inst_schema.json#"
kind: instruction
name: vmsbc.vv
long_name: "Vector multiply-subtract with carry"
description: |
  Performs multiply-subtract operation on elements from vector registers vs2 and vs1, subtracts the carry-in from vector register vs3, and stores results in vector register vd, using vector mask vm.
definedBy:
  extension:
    name: Zvl32b
assembly: vd, vs2, vs1
encoding:
  match: 0100111----------000-----1010111
  variables:
    - name: vs2
      location: 24-20
    - name: vs1
      location: 19-15
    - name: vd
      location: 11-7
access:
  s: always
  u: always
  vs: always
  vu: always
data_independent_timing: false
operation(): |
