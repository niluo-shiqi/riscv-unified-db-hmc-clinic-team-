# yaml-language-server: $schema=../../../../schemas/inst_schema.json

$schema: "inst_schema.json#"
kind: instruction
name: vsetvli
long_name: Set vector length immediate
description: |
  Sets the vector length register vl and vector type register vtype based on immediate values. Configures SEW, LMUL, and other vector parameters for subsequent vector operations.
definedBy:
  extension:
    name: Zvl32b
assembly: xd, xs1, vtypei
encoding:
  match: 0----------------111-----1010111
  variables:
    - name: vtypei
      location: 30-20
    - name: xs1
      location: 19-15
    - name: xd
      location: 11-7
access:
  s: always
  u: always
  vs: always
  vu: always
data_independent_timing: false
operation(): |
  # Save old vector state for ratio comparison (needed for xs1==0 && xd==0 case)
  VectorState old_state = vector_state();

  XReg new_vtype = vtypei;
  if ((new_vtype[xlen() - 1] == 1'b1) # software is setting the illegal bit
      || ((new_vtype & 8'd0) != 0)    # reserved bits
      || (new_vtype[5] == 1)          # reserved vsew encoding
      || (new_vtype[2:0] == 3'b100)   # reserved vlmul encoding
      # || (xlen() == 32 && new_vtype[2:0] == 3'b101) # reserved LMUL in RV32
      )
  {
    CSR[vtype].VILL = 1;
    CSR[vtype].VMA = 0;
    CSR[vtype].VTA = 0;
    CSR[vtype].VSEW = 0;
    CSR[vtype].VLMUL = 0;
    CSR[vl].VALUE = 0;
  } else {
    # valid, do the write
    CSR[vtype].VILL = 0;
    CSR[vtype].VMA = new_vtype[7];
    CSR[vtype].VTA = new_vtype[6];
    CSR[vtype].VSEW = new_vtype[5:3];
    CSR[vtype].VLMUL = new_vtype[2:0];

    VectorState state = vector_state();
    XReg vlen = VLEN;
    XReg vlmax = (vlen << state.log2_lmul) >> state.log2_sew;
    XReg avl = X[xs1];
    XReg ceil_avl_over_two = (avl + 1) / 2;

    # Determine vl based on xs1 (AVL source) and xd (destination)
    if (xs1 == 0 && xd != 0) {
      # rs1 == x0, rd != x0: set vl to VLMAX
      CSR[vl].VALUE = vlmax;
    } else if (xs1 == 0) {
      # rs1 == x0, rd == x0: keep existing vl, but check LMUL/SEW ratio
      XReg old_ratio = old_state.log2_sew - old_state.log2_lmul;
      XReg new_ratio = state.log2_sew - state.log2_lmul;
      if (new_ratio != old_ratio) {
        # Ratio changed - set vill and clear vl
        CSR[vtype].VILL = 1;
        CSR[vtype].VMA = 0;
        CSR[vtype].VTA = 0;
        CSR[vtype].VSEW = 0;
        CSR[vtype].VLMUL = 0;
        CSR[vl].VALUE = 0;
      }
      # else: keep vl unchanged
    } else if (avl <= vlmax) {
      # Normal stripmining: AVL <= VLMAX
      CSR[vl].VALUE = avl;
    } else if (avl < 2 * vlmax) {
      # VLMAX < AVL < 2*VLMAX: implementation-defined behavior
      if (RVV_VL_WHEN_AVL_LT_DOUBLE_VLMAX == "ceil(AVL/2)") {
        CSR[vl].VALUE = ceil_avl_over_two;
      } else if (RVV_VL_WHEN_AVL_LT_DOUBLE_VLMAX == "VLMAX") {
        CSR[vl].VALUE = vlmax;
      } else {
        unpredictable("Implementations may choose a custom value for vl in the case AVL < (2*VLMAX), so long as ceil(AVL/2) <= vl <= VLMAX");
      }
    } else {
      # AVL >= 2*VLMAX: set vl to VLMAX
      CSR[vl].VALUE = vlmax;
    }
  }
  X[xd] = CSR[vl].VALUE;
  CSR[vstart].VALUE = 0;
