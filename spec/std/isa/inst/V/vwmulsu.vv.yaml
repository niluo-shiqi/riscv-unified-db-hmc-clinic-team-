# yaml-language-server: $schema=../../../../schemas/inst_schema.json

$schema: "inst_schema.json#"
kind: instruction
name: vwmulsu.vv
long_name: "Vector widening signed-unsigned multiplication"
description: |
  Performs signed-unsigned multiplication on elements from vector registers vs2 (signed) and vs1 (unsigned), widens the results, and stores them in vector register vd, using vector mask vm.
definedBy:
  extension:
    name: Zvl32b
assembly: vd, vs2, vs1, vm
encoding:
  match: 111010-----------010-----1010111
  variables:
    - name: vm
      location: 25-25
    - name: vs2
      location: 24-20
    - name: vs1
      location: 19-15
    - name: vd
      location: 11-7
access:
  s: always
  u: always
  vs: always
  vu: always
data_independent_timing: false
operation(): |
