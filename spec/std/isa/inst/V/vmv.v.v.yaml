# yaml-language-server: $schema=../../../../schemas/inst_schema.json

$schema: "inst_schema.json#"
kind: instruction
name: vmv.v.v
long_name: "Vector register move"
description: |
  Copies elements from vector register vs2 to vector register vd, using vector mask vm. This operation performs a simple register-to-register copy.
definedBy:
  extension:
    name: Zvl32b
assembly: vd, vs1
encoding:
  match: 010111100000-----000-----1010111
  variables:
    - name: vs1
      location: 19-15
    - name: vd
      location: 11-7
access:
  s: always
  u: always
  vs: always
  vu: always
data_independent_timing: false
operation(): |
