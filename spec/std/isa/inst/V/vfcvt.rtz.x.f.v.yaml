# yaml-language-server: $schema=../../../../schemas/inst_schema.json

$schema: "inst_schema.json#"
kind: instruction
name: vfcvt.rtz.x.f.v
long_name: "Vector floating-point to integer conversion with truncation"
description: |
  Converts floating-point elements from vector register vs2 to signed integer format using round-toward-zero mode and stores results in vector register vd, using vector mask vm.
definedBy:
  extension:
    name: Zvl32b
assembly: vd, vs2, vm
encoding:
  match: 010010------00111001-----1010111
  variables:
    - name: vm
      location: 25-25
    - name: vs2
      location: 24-20
    - name: vd
      location: 11-7
access:
  s: always
  u: always
  vs: always
  vu: always
data_independent_timing: false
operation(): |
