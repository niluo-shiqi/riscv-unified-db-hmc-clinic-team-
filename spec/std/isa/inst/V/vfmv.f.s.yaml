# yaml-language-server: $schema=../../../../schemas/inst_schema.json

$schema: "inst_schema.json#"
kind: instruction
name: vfmv.f.s
long_name: "Vector floating-point to scalar move"
description: |
  Moves floating-point element from vector register vs2 to scalar floating-point register fd, using vector mask vm. This operation extracts a single element from the vector.
definedBy:
  extension:
    name: Zvl32b
assembly: fd, vs2
encoding:
  match: 0100001-----00000001-----1010111
  variables:
    - name: vs2
      location: 24-20
    - name: fd
      location: 11-7
access:
  s: always
  u: always
  vs: always
  vu: always
data_independent_timing: false
operation(): |
