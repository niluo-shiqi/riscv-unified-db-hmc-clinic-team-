# yaml-language-server: $schema=../../../../schemas/inst_schema.json

$schema: "inst_schema.json#"
kind: instruction
name: vadd.vi
long_name: Vector-immediate integer addition
description: |
  Adds immediate value to elements from vector register vs2 according to mask vm and stores results in vector register vd. Element width is determined by SEW setting.
definedBy:
  extension:
    name: Zvl32b
assembly: vd, vs2, imm, vm
encoding:
  match: 000000-----------011-----1010111
  variables:
    - name: vm
      location: 25-25
    - name: vs2
      location: 24-20
    - name: imm
      location: 19-15
    - name: vd
      location: 11-7
access:
  s: always
  u: always
  vs: always
  vu: always
data_independent_timing: true
operation(): |
