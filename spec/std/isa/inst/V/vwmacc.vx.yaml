# yaml-language-server: $schema=../../../../schemas/inst_schema.json

$schema: "inst_schema.json#"
kind: instruction
name: vwmacc.vx
long_name: "Vector widening multiply-add with scalar"
description: |
  Performs widening multiplication on elements from vector register vs2 and scalar register xs1, adds the result to elements from vector register vd, and stores the final results in vector register vd, using vector mask vm.
definedBy:
  extension:
    name: Zvl32b
assembly: vd, xs1, vs2, vm
encoding:
  match: 111101-----------110-----1010111
  variables:
    - name: vm
      location: 25-25
    - name: vs2
      location: 24-20
    - name: xs1
      location: 19-15
    - name: vd
      location: 11-7
access:
  s: always
  u: always
  vs: always
  vu: always
data_independent_timing: false
operation(): |
