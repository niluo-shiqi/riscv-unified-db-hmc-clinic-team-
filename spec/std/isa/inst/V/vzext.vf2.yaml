# yaml-language-server: $schema=../../../../schemas/inst_schema.json

$schema: "inst_schema.json#"
kind: instruction
name: vzext.vf2
long_name: "Vector zero-extend by factor of 2"
description: |
  Zero-extends elements from vector register vs2 by a factor of 2 and stores results in vector register vd, using vector mask vm. The operation extends SEW to 2×SEW.
definedBy:
  extension:
    name: Zvl32b
assembly: vd, vs2, vm
encoding:
  match: 010010------00110010-----1010111
  variables:
    - name: vm
      location: 25-25
    - name: vs2
      location: 24-20
    - name: vd
      location: 11-7
access:
  s: always
  u: always
  vs: always
  vu: always
data_independent_timing: false
operation(): |
