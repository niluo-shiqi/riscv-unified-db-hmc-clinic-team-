# yaml-language-server: $schema=../../../../schemas/inst_schema.json

$schema: "inst_schema.json#"
kind: instruction
name: vrsub.vx
long_name: "Vector reverse subtract with scalar"
description: |
  Performs reverse subtraction on elements from scalar register xs1 and vector register vs2 and stores results in vector register vd, using vector mask vm.
definedBy:
  extension:
    name: Zvl32b
assembly: vd, vs2, xs1, vm
encoding:
  match: 000011-----------100-----1010111
  variables:
    - name: vm
      location: 25-25
    - name: vs2
      location: 24-20
    - name: xs1
      location: 19-15
    - name: vd
      location: 11-7
access:
  s: always
  u: always
  vs: always
  vu: always
pseudoinstructions:
  - when: xs1 == 0
    to: vneg.v vd, vs2, vm
data_independent_timing: true
operation(): |
