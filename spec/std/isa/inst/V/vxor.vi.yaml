# yaml-language-server: $schema=../../../../schemas/inst_schema.json

$schema: "inst_schema.json#"
kind: instruction
name: vxor.vi
long_name: "Vector bitwise XOR with immediate"
description: |
  Performs bitwise XOR operation on elements from vector register vs2 and immediate value and stores results in vector register vd, using vector mask vm.
definedBy:
  extension:
    name: Zvl32b
assembly: vd, vs2, imm, vm
encoding:
  match: 001011-----------011-----1010111
  variables:
    - name: vm
      location: 25-25
    - name: vs2
      location: 24-20
    - name: imm
      location: 19-15
      sign_extend: true
    - name: vd
      location: 11-7
access:
  s: always
  u: always
  vs: always
  vu: always
pseudoinstructions:
  - when: imm == -1
    to: vnot.v vd, vs2, vm
data_independent_timing: false
operation(): |
