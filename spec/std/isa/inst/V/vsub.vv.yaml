# yaml-language-server: $schema=../../../../schemas/inst_schema.json

$schema: "inst_schema.json#"
kind: instruction
name: vsub.vv
long_name: Vector-vector integer subtraction
description: |
  Subtracts corresponding elements of vs1 from vs2 according to mask vm and stores results in vd. Element width is determined by SEW setting.
definedBy:
  extension:
    name: Zvl32b
assembly: vd, vs2, vs1, vm
encoding:
  match: 000010-----------000-----1010111
  variables:
    - name: vm
      location: 25-25
    - name: vs2
      location: 24-20
    - name: vs1
      location: 19-15
    - name: vd
      location: 11-7
access:
  s: always
  u: always
  vs: always
  vu: always
data_independent_timing: true
operation(): |
