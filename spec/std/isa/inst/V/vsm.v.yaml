# yaml-language-server: $schema=../../../../schemas/inst_schema.json

$schema: "inst_schema.json#"
kind: instruction
name: vsm.v
long_name: Vector store mask
description: |
  Stores a vector mask from vector register vs2 to memory starting at address in xs1 register. This operation is used to save vector masks for later restoration.
definedBy:
  extension:
    name: Zvl32b
assembly: vs3, (xs1)
encoding:
  match: 000000101011-----000-----0100111
  variables:
    - name: xs1
      location: 19-15
    - name: vs3
      location: 11-7
access:
  s: always
  u: always
  vs: always
  vu: always
data_independent_timing: false
operation(): |
