# yaml-language-server: $schema=../../../schemas/csr_schema.json

$schema: "csr_schema.json#"
kind: csr
name: mstatush
long_name: Machine Status High
address: 0x310
writable: true
priv_mode: M
length: 32
description:
  The mstatus register tracks and controls the hart's current operating
  state.
definedBy:
  allOf:
    - xlen: 32
    - extension:
        name: Sm
        version: ">= 1.12"
fields:
  MDT:
    location: 10
    description: |
      see `mstatus.MDT`
    type: RW-H
    reset_value: UNDEFINED_LEGAL
    alias: mstatus.MDT
    definedBy:
      extension:
        name: Smdbltrp
  MPELP:
    location: 9
    description: |
      see `mstatus.MPELP`
    type: RW-H
    reset_value: UNDEFINED_LEGAL
    alias: mstatus.MPELP
    definedBy:
      extension:
        name: Zicfilp
  MPV:
    location: 7
    description: |
      see `mstatus.MPV`
    type: RW-H
    reset_value: UNDEFINED_LEGAL
    alias: mstatus.MPV
    definedBy:
      extension:
        name: H
  GVA:
    location: 6
    description: |
      see `mstatus.GVA`
    type: RW-H
    reset_value: 0
    alias: mstatus.GVA
    definedBy:
      extension:
        name: H
  MBE:
    location: 5
    description: |
      see `mstatus.MBE`
    type(): |
      return (M_MODE_ENDIANNESS == "dynamic") ? CsrFieldType::RW : CsrFieldType::RO;
    reset_value(): |
      return (M_MODE_ENDIANNESS == "big") ? 1 : 0;
    alias: mstatus.MBE
  SBE:
    location: 4
    definedBy:
      extension:
        name: S
    description: |
      see `mstatus.SBE`
    type(): |
      return (S_MODE_ENDIANNESS == "dynamic") ? CsrFieldType::RW : CsrFieldType::RO;
    reset_value(): |
      if (S_MODE_ENDIANNESS == "little") {
        return 0;
      } else if (S_MODE_ENDIANNESS == "big") {
        return 1;
      } else {
        return UNDEFINED_LEGAL;
      }
    alias: mstatus.SBE
