name: Autofix PR Comment Handler

on:
  workflow_run:
    workflows: ["autofix.ci"]
    types: [completed]

permissions:
  contents: read
  pull-requests: write

jobs:
  comment-on-regress-failure:
    runs-on: ubuntu-latest
    if: >-
      github.event.workflow_run.conclusion == 'failure' &&
      github.event.workflow_run.event == 'pull_request' &&
      github.event.workflow_run.name == 'autofix.ci' &&
      github.event.workflow_run.head_repository.full_name == github.repository
    steps:
      - name: Derive trusted PR number from workflow_run payload
        id: pr
        run: |
          set -euo pipefail

          pr_number="$(jq -r \
            --arg sha "${{ github.event.workflow_run.head_sha }}" \
            --arg repo "${{ github.repository }}" \
            '[.workflow_run.pull_requests[]
             | select(.head.sha == $sha and .base.repo.full_name == $repo)
             | .number] | first // empty' \
            "$GITHUB_EVENT_PATH")"

          if [ -z "$pr_number" ]; then
            echo "has_pr=false" >> "$GITHUB_OUTPUT"
          else
            echo "has_pr=true" >> "$GITHUB_OUTPUT"
            echo "number=$pr_number" >> "$GITHUB_OUTPUT"
          fi

      - name: Check whether regress workflow inputs changed
        if: steps.pr.outputs.has_pr == 'true'
        id: check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          pr_number="${{ steps.pr.outputs.number }}"
          changed_files="$(gh api --paginate \
            repos/${{ github.repository }}/pulls/${pr_number}/files \
            --jq '.[].filename')"

          if grep -E -q '^(\.github/workflows/regress\.yml|tools/test/regress-tests\.yaml|tools/test/regress-gh-template\.yaml|tools/test/gen_regress\.rb)$' <(echo "$changed_files"); then
            echo "needs_comment=true" >> "$GITHUB_OUTPUT"
          else
            echo "needs_comment=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Post PR comment about regress.yml
        if: steps.pr.outputs.has_pr == 'true' && steps.check.outputs.needs_comment == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cat << 'EOF' > pr-comment.md
          <!-- autofix-regress-comment -->
          ## ⚠️ Autofix Failed: Workflow File Update Required

          The `autofix.ci` check failed because it cannot commit changes to `.github/workflows/regress.yml` due to security restrictions.

          **To fix this:**

          1. Run the following command locally:
             ```bash
             ./bin/chore gen regress
             ```

          2. Review the changes to `.github/workflows/regress.yml`

          3. Commit the changes:
             ```bash
             git add .github/workflows/regress.yml
             git commit -m "Regenerate regress workflow"
             git push
             ```

          The autofix check should pass once the workflow file is updated.

          ---
          <sub>This is an automated message. The workflow file needs to be regenerated because you modified one of: `tools/test/regress-tests.yaml`, `tools/test/regress-gh-template.yaml`, or `tools/test/gen_regress.rb`.</sub>
          EOF

          existing_id="$(gh api --paginate --slurp \
            repos/${{ github.repository }}/issues/${{ steps.pr.outputs.number }}/comments \
            --jq 'first(map(.[])[] | select(.body | contains("<!-- autofix-regress-comment -->")) | .id) // empty')"

          if [ -n "$existing_id" ]; then
            gh api repos/${{ github.repository }}/issues/comments/"$existing_id" \
              -X PATCH -F body=@pr-comment.md
          else
            gh pr comment "${{ steps.pr.outputs.number }}" \
              --repo "${{ github.repository }}" \
              --body-file pr-comment.md
          fi
