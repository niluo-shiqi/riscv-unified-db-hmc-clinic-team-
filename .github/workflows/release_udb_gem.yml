name: Release udb gem to RubyGems.org

# Builds and publishes the udb gem to rubygems.org whenever the version
# string in version.rb changes on the main branch.
#
# A git tag "udb-gem-VERSION" is created on the release commit so the
# exact source that produced each published gem is always traceable.
# The tag check also makes the workflow idempotent: re-running it for the
# same version is a no-op.

on:
  push:
    branches:
      - main
    paths:
      - 'tools/ruby-gems/udb/lib/udb/version.rb'
  workflow_dispatch:

jobs:
  release-udb-gem:
    runs-on: ubuntu-24.04
    permissions:
      contents: write   # needed to push the release tag

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Get gem version
        id: version
        run: |
          VERSION=$(ruby -e "load 'tools/ruby-gems/udb/lib/udb/version.rb'; puts Udb.version")
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"

      - name: Check if release tag already exists
        run: |
          if git ls-remote --tags origin "refs/tags/udb-gem-${VERSION}" | grep -q .; then
            echo "TAG_EXISTS=true" >> "$GITHUB_ENV"
            echo "Tag udb-gem-${VERSION} already exists – skipping release."
          else
            echo "TAG_EXISTS=false" >> "$GITHUB_ENV"
          fi

      - name: Set up Ruby
        if: env.TAG_EXISTS == 'false'
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: true
          working-directory: tools/ruby-gems/udb

      - name: Prepare gem staging directory
        if: env.TAG_EXISTS == 'false'
        run: |
          cd tools/ruby-gems/udb
          bundle exec rake release:udb:prepare

      - name: Build gem
        if: env.TAG_EXISTS == 'false'
        run: |
          cd gen/udb_gem
          BUNDLE_GEMFILE= gem build udb.gemspec

      - name: Push gem to RubyGems.org
        if: env.TAG_EXISTS == 'false'
        env:
          GEM_HOST_API_KEY: ${{ secrets.RUBYGEM_API_KEY }}
        run: gem push "gen/udb_gem/udb-${VERSION}.gem"

      - name: Create and push release tag
        if: env.TAG_EXISTS == 'false'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "udb-gem-${VERSION}"
          git push origin "udb-gem-${VERSION}"
