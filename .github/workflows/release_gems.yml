name: Release gems to RubyGems.org

# Builds and publishes gems to rubygems.org whenever their version.rb changes on main.
#
# A git tag "GEM_NAME-gem-VERSION" is created on the release commit so the
# exact source that produced each published gem is always traceable.
# The tag check also makes the workflow idempotent: re-running it for the
# same version is a no-op.

on:
  push:
    branches:
      - main
    paths:
      - 'tools/ruby-gems/*/lib/*/version.rb'
  workflow_dispatch:
    inputs:
      gem:
        description: 'Gem to release (idlc, udb, udb-gen, udb_helpers, or all)'
        required: false
        default: 'all'

jobs:
  detect-gems:
    runs-on: ubuntu-24.04
    outputs:
      gems: ${{ steps.set-gems.outputs.gems }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 2  # Need to check changed files

      - name: Detect changed gems
        id: set-gems
        run: |
          # Manual dispatch - release specified gem or all gems
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            if [[ "${{ github.event.inputs.gem }}" == "all" ]]; then
              GEMS='["idlc","udb","udb-gen","udb_helpers"]'
            else
              GEMS='["${{ github.event.inputs.gem }}"]'
            fi
          else
            # Push event - detect which version.rb files changed
            CHANGED_FILES=$(git diff --name-only HEAD~1 HEAD)
            GEMS="["
            SEPARATOR=""

            if echo "$CHANGED_FILES" | grep -q "tools/ruby-gems/idlc/lib/idlc/version.rb"; then
              GEMS="${GEMS}${SEPARATOR}\"idlc\""
              SEPARATOR=","
            fi

            if echo "$CHANGED_FILES" | grep -q "tools/ruby-gems/udb/lib/udb/version.rb"; then
              GEMS="${GEMS}${SEPARATOR}\"udb\""
              SEPARATOR=","
            fi

            if echo "$CHANGED_FILES" | grep -q "tools/ruby-gems/udb-gen/lib/udb-gen/version.rb"; then
              GEMS="${GEMS}${SEPARATOR}\"udb-gen\""
              SEPARATOR=","
            fi

            if echo "$CHANGED_FILES" | grep -q "tools/ruby-gems/udb_helpers/lib/udb_helpers/version.rb"; then
              GEMS="${GEMS}${SEPARATOR}\"udb_helpers\""
              SEPARATOR=","
            fi

            GEMS="${GEMS}]"
          fi

          echo "gems=$GEMS" >> "$GITHUB_OUTPUT"
          echo "Gems to release: $GEMS"

  release-gem:
    needs: detect-gems
    if: needs.detect-gems.outputs.gems != '[]'
    runs-on: ubuntu-24.04
    permissions:
      contents: write   # needed to push the release tag

    strategy:
      matrix:
        gem: ${{ fromJson(needs.detect-gems.outputs.gems) }}
        include:
          - gem: idlc
            gem_dir: idlc
            gen_dir: idlc_gem
            version_module: "Idl::Compiler"
            rake_task: idlc
          - gem: udb
            gem_dir: udb
            gen_dir: udb_gem
            version_module: "Udb"
            rake_task: udb
          - gem: udb-gen
            gem_dir: udb-gen
            gen_dir: udb_gen_gem
            version_module: "UdbGen"
            rake_task: udb_gen
          - gem: udb_helpers
            gem_dir: udb_helpers
            gen_dir: udb_helpers_gem
            version_module: "Udb::Helpers"
            rake_task: udb_helpers

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0  # Fetch full history to avoid merge-base errors

      - name: Get gem version
        id: version
        run: |
          VERSION=$(ruby -e "load 'tools/ruby-gems/${{ matrix.gem_dir }}/lib/${{ matrix.gem_dir }}/version.rb'; puts ${{ matrix.version_module }}.version")
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"
          echo "Releasing ${{ matrix.gem }} version $VERSION"

      - name: Check if release tag already exists
        run: |
          if git ls-remote --tags origin "refs/tags/${{ matrix.gem }}-gem-${VERSION}" | grep -q .; then
            echo "TAG_EXISTS=true" >> "$GITHUB_ENV"
            echo "Tag ${{ matrix.gem }}-gem-${VERSION} already exists – skipping release."
          else
            echo "TAG_EXISTS=false" >> "$GITHUB_ENV"
          fi

      - name: Set up Ruby
        if: env.TAG_EXISTS == 'false'
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: true
          working-directory: tools/ruby-gems/${{ matrix.gem_dir }}

      - name: Prepare gem staging directory
        if: env.TAG_EXISTS == 'false'
        run: |
          cd tools/ruby-gems/${{ matrix.gem_dir }}
          bundle exec rake release:${{ matrix.rake_task }}:prepare

      - name: Build gem
        if: env.TAG_EXISTS == 'false'
        run: |
          cd gen/${{ matrix.gen_dir }}
          BUNDLE_GEMFILE= gem build ${{ matrix.gem }}.gemspec

      - name: Push gem to RubyGems.org
        if: env.TAG_EXISTS == 'false'
        env:
          GEM_HOST_API_KEY: ${{ secrets.RUBYGEM_API_KEY }}
        run: gem push "gen/${{ matrix.gen_dir }}/${{ matrix.gem }}-${VERSION}.gem"

      - name: Create and push release tag
        if: env.TAG_EXISTS == 'false'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "${{ matrix.gem }}-gem-${VERSION}"
          git push origin "${{ matrix.gem }}-gem-${VERSION}"
