<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <style>
    .bg   { fill: var(--idl-logo-bg, #161b22); }
    .mark { stroke: var(--idl-logo-fg, #33f1ff); }
  </style>
  <!-- circle bg with fg-colored border -->
  <circle cx="50" cy="50" r="48" class="bg" stroke="var(--idl-logo-fg, #33f1ff)" stroke-width="1.5"/>
  <!--
    App icon content area: x=15..95, y=19..80 (80w x 61h).
    Scale s=0.82 to fit inside circle (inscribed square ~67.9px).
    Content becomes 65.6w x 50h.
    Center in 100x100: dx=17.2, dy=25.
    Transform: x' = 17.2 + (x-15)*0.82,  y' = 25 + (y-19)*0.82
  -->
  <g class="mark" stroke-width="4.1" stroke-linecap="butt" stroke-linejoin="miter" fill="none">
    <!-- I: top serif -->
    <line x1="17.2" y1="31.9" x2="28.7" y2="31.9" />
    <!-- I: top stem -->
    <line x1="22.9" y1="25.0" x2="22.9" y2="36.5" />
    <!-- I: entry stroke + lower stem -->
    <path d="M 17.2 47.7 L 22.9 42.8 L 22.9 75.0" />
    <!-- I: bottom serif -->
    <line x1="17.2" y1="75.0" x2="28.7" y2="75.0" />
    <!-- D: stem -->
    <line x1="41.8" y1="25.0" x2="41.8" y2="75.0" />
    <!-- D: curve -->
    <path d="M 45.9 25.0 C 62.4 25.0, 62.4 75.0, 45.9 75.0" />
    <!-- L: stem -->
    <line x1="66.4" y1="25.0" x2="66.4" y2="66.8" />
    <!-- L: foot -->
    <line x1="66.4" y1="75.0" x2="82.8" y2="75.0" />
  </g>
</svg>
